<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>推し活アプリ</title>

<style>
body {
  margin:0;
  font-family:-apple-system;
  background: linear-gradient(180deg,#0f172a,#1e293b);
  color:white;
}
.container {
  max-width:420px;
  margin:auto;
  padding:15px;
}
.card {
  background: rgba(255,255,255,0.08);
  border-radius:20px;
  padding:15px;
  margin-bottom:15px;
}
input, select {
  width:100%;
  padding:10px;
  border-radius:12px;
  border:none;
  margin-top:5px;
  background: rgba(255,255,255,0.15);
  color:white;
}
button {
  border:none;
  border-radius:12px;
  padding:10px;
  margin-top:8px;
}
.primary {
  background:#6366f1;
  color:white;
}
.gallery img {
  width:100%;
  margin-top:5px;
  border-radius:10px;
}
.date-group {
  margin-top:10px;
  padding:10px;
  background: rgba(255,255,255,0.05);
  border-radius:10px;
}
</style>
</head>

<body>
<div class="container">

<div class="card">
<h3>ログイン</h3>
<input id="email">
<input id="password" type="password">
<button onclick="login()">ログイン</button>
<button onclick="register()">登録</button>
</div>

<div class="card">
<h3>チェキ設定</h3>
<input id="type1Name" value="通常">
<input id="type1Price" type="number" value="1000">
<input id="type2Name" value="サイン">
<input id="type2Price" type="number" value="2000">
</div>

<div class="card">
<h3>記録</h3>
<input id="member" placeholder="メンバー">
<select id="type"></select>
<input id="event" placeholder="ライブ">
<input id="date" type="date">
<input type="file" id="image">
<button onclick="saveLog()">保存</button>
</div>

<div class="card">
<h3>フィルター</h3>
<input type="date" id="filterDate">
<input id="filterMember" placeholder="メンバー絞り込み">
<button onclick="applyFilter()">絞り込み</button>
<button onclick="loadLogs()">全表示</button>
</div>

<div class="card">
<h3>合計</h3>
<div id="total">0円</div>
</div>

<div class="card">
<h3>日付ごと一覧</h3>
<div id="list"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "oshi-app-2b208.firebaseapp.com",
  projectId: "oshi-app-2b208",
  storageBucket: "oshi-app-2b208.firebasestorage.app",
  appId: "1:292512355103:web:db7ef918accb698991562a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();
const storage = getStorage();

function updateTypes(){
  type.innerHTML = `
  <option value="${type1Price.value}">${type1Name.value}</option>
  <option value="${type2Price.value}">${type2Name.value}</option>`;
}
window.onload = updateTypes;
type1Name.oninput = updateTypes;
type1Price.oninput = updateTypes;
type2Name.oninput = updateTypes;
type2Price.oninput = updateTypes;

window.login = ()=>signInWithEmailAndPassword(auth,email.value,password.value);
window.register = ()=>createUserWithEmailAndPassword(auth,email.value,password.value);

async function uploadImage(file){
  const r = ref(storage,'img/'+Date.now());
  await uploadBytes(r,file);
  return await getDownloadURL(r);
}

window.saveLog = async function(){
  if(!auth.currentUser)return alert("ログインして");

  let url="";
  if(image.files[0]) url = await uploadImage(image.files[0]);

  await addDoc(collection(db,"logs"),{
    uid:auth.currentUser.uid,
    member:member.value,
    type:Number(type.value),
    date:date.value,
    image:url
  });

  loadLogs();
};

window.applyFilter = async function(){
  const d = filterDate.value;
  const m = filterMember.value;

  const snap = await getDocs(collection(db,"logs"));
  render(snap,d,m);
};

async function loadLogs(){
  const snap = await getDocs(collection(db,"logs"));
  render(snap);
}

function render(snapshot, filterDate="", filterMember=""){
  let total=0;
  let map={};

  snapshot.forEach(doc=>{
    let d=doc.data();
    if(d.uid!==auth.currentUser?.uid)return;

    if(filterDate && d.date!==filterDate)return;
    if(filterMember && !d.member.includes(filterMember))return;

    total+=d.type||0;

    if(!map[d.date]) map[d.date]=[];
    map[d.date].push(d);
  });

  document.getElementById("total").innerText = total+"円";

  let html="";
  Object.keys(map).sort().reverse().forEach(date=>{
    let dayTotal=0;

    html+=`<div class="date-group"><b>${date}</b><br>`;

    map[date].forEach(d=>{
      dayTotal+=d.type||0;
      if(d.image) html+=`<img src="${d.image}">`;
    });

    html+=`<div>合計:${dayTotal}円</div></div>`;
  });

  list.innerHTML = html;
}

onAuthStateChanged(auth,user=>{
  if(user) loadLogs();
});
</script>

</body>
</html>
