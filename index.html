<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>推し活アプリ</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6366f1">

<style>
body {
  margin:0;
  font-family:-apple-system;
  background: linear-gradient(180deg,#0f172a,#1e293b);
  color:white;
}
.container {
  max-width:420px;
  margin:auto;
  padding:15px;
}
.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border-radius:20px;
  padding:15px;
  margin-bottom:15px;
}
input, textarea {
  width:100%;
  padding:10px;
  border-radius:12px;
  border:none;
  margin-top:5px;
  background: rgba(255,255,255,0.15);
  color:white;
}
button {
  border:none;
  border-radius:12px;
  padding:10px;
  margin-top:8px;
}
.primary {
  background: linear-gradient(135deg,#6366f1,#8b5cf6);
  color:white;
}
.gallery {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.gallery img {
  width:100%;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>ログイン</h2>
<input id="email" placeholder="メール">
<input id="password" placeholder="パスワード" type="password">
<button class="primary" onclick="login()">ログイン</button>
<button onclick="register()">新規登録</button>
</div>

<div class="card">
<h2>ライブ</h2>
<input id="event" placeholder="ライブ名">
<input id="date" type="date">
</div>

<div class="card">
<h2>メモ</h2>
<textarea id="memo"></textarea>
</div>

<div class="card">
<input type="file" id="image">
<button class="primary" onclick="saveLog()">保存</button>
</div>

<div class="card">
<h2>ギャラリー</h2>
<div class="gallery" id="gallery"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyATMb11o7Tkb7Ai-si56NrAq0vKcbHx068",
  authDomain: "oshi-app-2b208.firebaseapp.com",
  projectId: "oshi-app-2b208",
  storageBucket: "oshi-app-2b208.firebasestorage.app",
  messagingSenderId: "292512355103",
  appId: "1:292512355103:web:db7ef918accb698991562a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();
const storage = getStorage();

// ログイン
window.login = function(){
  signInWithEmailAndPassword(auth,email.value,password.value)
  .then(()=>{
    alert("ログイン成功");
    loadLogs();
  })
  .catch(e=>alert(e.message));
};

// 登録
window.register = function(){
  const emailVal = document.getElementById("email").value;
  const passVal = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, emailVal, passVal)
  .then(()=>alert("登録完了"))
  .catch(e=>alert(e.message));
};

// 画像アップ
async function uploadImage(file){
  const storageRef = ref(storage,'images/'+Date.now());
  await uploadBytes(storageRef,file);
  return await getDownloadURL(storageRef);
}

// 保存
window.saveLog = async function(){
  let file = document.getElementById("image").files[0];
  let imageUrl = "";

  if(file){
    imageUrl = await uploadImage(file);
  }

  await addDoc(collection(db,"logs"),{
    uid: auth.currentUser.uid,
    event: event.value,
    date: date.value,
    memo: memo.value,
    image: imageUrl,
    created: new Date()
  });

  alert("保存完了");
  loadLogs();
};

// 読み込み
async function loadLogs(){
  const snapshot = await getDocs(collection(db,"logs"));
  let html="";

  snapshot.forEach(doc=>{
    let d=doc.data();
    if(d.uid===auth.currentUser.uid && d.image){
      html += `<img src="${d.image}">`;
    }
  });

  document.getElementById("gallery").innerHTML = html;
}
</script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
